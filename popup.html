<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
    }
    .header {
      background: #00a884;
      color: #fff;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header small {
      font-weight: 400;
      opacity: 0.7;
      font-size: 10px;
    }
    .body { padding: 16px; }

    .status-card {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-connected { background: #e8faf5; border: 1px solid #b7ebe0; }
    .status-disconnected { background: #fef3f2; border: 1px solid #f5c6c2; }
    .status-checking { background: #f5f5f5; border: 1px solid #e0e0e0; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #00a884; }
    .dot-red { background: #c0392b; }
    .dot-gray { background: #999; }
    .status-text { font-weight: 600; font-size: 12px; }
    .status-detail { font-size: 11px; color: #666; margin-top: 2px; }

    .config-section { border-top: 1px solid #eee; padding-top: 12px; margin-top: 8px; }
    .config-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .config-value { font-size: 11px; color: #444; font-family: monospace; word-break: break-all; margin-bottom: 8px; }

    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn {
      flex: 1; padding: 8px 10px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #00a884; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #008f71; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #e0e0e0; }

    .middleware-badge {
      display: inline-block; font-size: 9px; padding: 2px 6px;
      border-radius: 4px; font-weight: 600; background: #fff3e0; color: #e65100;
    }

    .footer {
      text-align: center; padding: 10px; border-top: 1px solid #f0f0f0;
      font-size: 10px; color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    ⚡ WZ → Salesforce <small id="version"></small>
  </div>

  <div class="body">
    <div id="status-card" class="status-card status-checking">
      <div class="status-dot dot-gray"></div>
      <div>
        <div class="status-text" id="status-text">Verificando...</div>
        <div class="status-detail" id="status-detail">Testando webhook n8n</div>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">Middleware <span class="middleware-badge">n8n</span></div>
      <div class="config-value" id="webhook-url">—</div>

      <div class="config-label">Salesforce Org</div>
      <div class="config-value" id="org-url">—</div>
    </div>

    <div class="btn-row">
      <button id="btn-refresh" class="btn btn-primary">🔄 Verificar</button>
      <button id="btn-open-sf" class="btn btn-secondary">🔗 Abrir SF</button>
    </div>

    <!-- Salesforce Auth -->
    <div class="config-section">
      <div class="config-label">Salesforce Login</div>
      <div id="sf-auth-status" class="status-card status-checking" style="margin-top:8px;">
        <div class="status-dot dot-gray"></div>
        <div>
          <div class="status-text" id="sf-auth-text">Verificando...</div>
          <div class="status-detail" id="sf-auth-detail"></div>
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-sf-login" class="btn btn-primary" style="background:#1798c1;">🔐 Login Salesforce</button>
        <button id="btn-sf-logout" class="btn btn-secondary" style="display:none;">🚪 Sair</button>
      </div>
    </div>
  </div>

  <div class="footer">Grupo Cometa — WhatsApp → n8n → Salesforce</div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
</html>
